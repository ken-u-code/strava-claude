name: Weekly Running Analysis

on:
  # Runs every Monday at 7:00 AM UTC — adjust timezone offset as needed
  schedule:
    - cron: "0 7 * * 1"

  # Also allows manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to look back"
        required: false
        default: "14"

jobs:
  analyse:
    runs-on: ubuntu-latest
    permissions:
      issues: write   # needed to create the GitHub Issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        id: run_analysis
        working-directory: scripts
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_ATHLETE_ID: ${{ secrets.STRAVA_ATHLETE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py > ../report.md
          echo "Report generated successfully."

      - name: Create GitHub Issue with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const today = new Date().toLocaleDateString('en-GB', {
              weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Running Analysis — ${today}`,
              body: report,
              labels: ['running-analysis']
            });
            console.log('Issue created — you will receive an email notification.');
